name: Build ImmortalWrt Redmi AX5 (35MB + PassWall)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 清理磁盘空间 (释放供编译使用的空间)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean

    - name: 初始化编译环境
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl

    - name: 克隆 ImmortalWrt 源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 更新 feeds (使用官方默认源)
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 载入 AX5 配置
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/ax5.config .config
        make defconfig

    - name: 下载依赖包
      run: |
        cd openwrt
        make download -j8

    - name: 创建 Swap (先卸载旧的，再创建新的防止 OOM)
      run: |
        sudo swapoff -a
        sudo rm -f /swapfile
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: 开始编译固件
      run: |
        cd openwrt
        make -j1 V=s

    - name: 上传固件 (打包整个 targets 目录防丢)
      uses: actions/upload-artifact@v4
      with:
        name: Redmi_AX5_35MB_Firmware
        path: openwrt/bin/targets/
