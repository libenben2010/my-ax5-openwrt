name: Build ImmortalWrt Redmi AX5 (OpenClash + AI API)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: 初始化环境
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl ccache

    - name: 启用 ccache
      run: |
        echo 'export CC="ccache gcc"' >> ~/.bashrc
        echo 'export CXX="ccache g++"' >> ~/.bashrc
        echo 'export PATH="/usr/lib/ccache:$PATH"' >> ~/.bashrc
        source ~/.bashrc
        ccache -M 2G
        ccache -s

    - name: Clone ImmortalWrt
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    # 🔧 修复 flex/m4 崩溃（重建 host 工具链）
    - name: Fix flex/m4 Host Toolchain Issue
      run: |
        cd openwrt
        rm -rf staging_dir/host
        rm -rf build_dir/host
        rm -rf tmp

    - name: Update Feeds
      run: |
        cd openwrt
        echo "src-git openclash https://github.com/vernesong/OpenClash" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load AX5 Target
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/ax5.config .config
        make defconfig

    - name: Add OpenClash + AI API Packages
      run: |
        cd openwrt
        cat >> .config <<EOF
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-theme-argon=y

        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_libnghttp2=y
        CONFIG_PACKAGE_libustream-openssl=y
        CONFIG_PACKAGE_ca-bundle=y

        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-zram=y
        CONFIG_PACKAGE_zram-swap=y

        CONFIG_PACKAGE_luci-app-cpufreq=y
        CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y

        CONFIG_PACKAGE_kmod-fast-classifier=y
        CONFIG_PACKAGE_kmod-shortcut-fe=y

        CONFIG_PACKAGE_libcares=y
        CONFIG_PACKAGE_libev=y
        EOF

        sed -i '/ruby/d' .config
        sed -i '/libruby/d' .config

        make defconfig

    - name: Download Packages
      run: |
        cd openwrt
        make download -j$(nproc)

    # 🧊 GitHub Actions 兼容 swap（dd）
    - name: Add Swap (AX5 Required)
      run: |
        sudo swapoff -a || true
        sudo rm -f /swapfile || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Compile Firmware
      run: |
        cd openwrt
        echo "⚙️ 编译 kernel（单线程避免 OOM）"
        make target/linux/clean
        make target/linux/compile -j1 V=s

        echo "🚀 编译全固件（多线程）"
        make -j$(nproc) V=s

    - name: 输出完整配置（.config + diffconfig）
      run: |
        cd openwrt
        cp .config $GITHUB_WORKSPACE/full_config.config
        ./scripts/diffconfig.sh > $GITHUB_WORKSPACE/diffconfig.config

    - name: 清理空间（避免上传失败）
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/share/boost

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: Redmi_AX5_OpenClash_AI
        path: openwrt/bin/targets/ipq60xx/generic/

    - name: Upload Configs
      uses: actions/upload-artifact@v4
      with:
        name: Build_Configs
        path: |
          full_config.config
          diffconfig.config
