name: Build ImmortalWrt Redmi AX5 (Stable Minimal)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 初始化环境
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget curl ccache

    - name: 启用 ccache
      run: |
        echo 'export CC="ccache gcc"' >> ~/.bashrc
        echo 'export CXX="ccache g++"' >> ~/.bashrc
        echo 'export PATH="/usr/lib/ccache:$PATH"' >> ~/.bashrc
        source ~/.bashrc
        ccache -M 4G
        ccache -s

    - name: Clone ImmortalWrt
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 使用 ax5.config 作为最终配置（最稳方式）
      run: |
        cd openwrt
        if [ ! -f "$GITHUB_WORKSPACE/ax5.config" ]; then
          echo "ERROR: 仓库根目录缺少 ax5.config"
          exit 1
        fi
        cp "$GITHUB_WORKSPACE/ax5.config" .config
        make defconfig

    - name: 创建 Swap（防止 OOM）
      run: |
        sudo swapoff -a || true
        sudo rm -f /swapfile || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=12288
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: 编译固件（先 kernel 再全编译）
      run: |
        cd openwrt
        echo "⚙️ 编译 kernel（单线程）"
        make target/linux/compile -j1 V=s
        echo "🚀 编译全固件（多线程）"
        make -j$(nproc) V=s || make -j1 V=s

    - name: 导出 config 与 diffconfig
      run: |
        cd openwrt
        ./scripts/diffconfig.sh > diffconfig
        cp .config bin/ || true
        cp diffconfig bin/ || true

    - name: 上传固件与配置（Artifacts）
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-ax5-firmware
        path: openwrt/bin/
        retention-days: 7
