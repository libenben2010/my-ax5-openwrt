name: Build ImmortalWrt Redmi AX5 (OpenClash + AI API)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 初始化环境
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl ccache

    - name: 启用 ccache
      run: |
        echo 'export CC="ccache gcc"' >> ~/.bashrc
        echo 'export CXX="ccache g++"' >> ~/.bashrc
        echo 'export PATH="/usr/lib/ccache:$PATH"' >> ~/.bashrc
        source ~/.bashrc
        ccache -M 2G
        ccache -s

    - name: Clone ImmortalWrt
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    # 防止残留导致 fallback x86
    - name: Clean Host & Target (Prevent x86 fallback)
      run: |
        cd openwrt
        rm -rf staging_dir
        rm -rf build_dir
        rm -rf tmp

    - name: Update Feeds
      run: |
        cd openwrt
        echo "src-git openclash https://github.com/vernesong/OpenClash" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 第一次强制锁定 AX5 目标
    - name: Load AX5 Target (Lock ipq60xx)
      run: |
        cd openwrt
        cat > .config <<EOF
        CONFIG_TARGET_ipq60xx=y
        CONFIG_TARGET_ipq60xx_generic=y
        CONFIG_TARGET_ipq60xx_generic_DEVICE_redmi_ax5=y
        EOF

        # 合并你的 ax5.config
        if [ -f "$GITHUB_WORKSPACE/ax5.config" ]; then
          cat "$GITHUB_WORKSPACE/ax5.config" >> .config
        fi

        make defconfig

    - name: Add OpenClash + AI API Packages
      run: |
        cd openwrt
        cat >> .config <<EOF
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-theme-argon=y

        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_libnghttp2=y
        CONFIG_PACKAGE_libustream-openssl=y
        CONFIG_PACKAGE_ca-bundle=y

        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-zram=y
        CONFIG_PACKAGE_zram-swap=y

        CONFIG_PACKAGE_luci-app-cpufreq=y
        CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y

        CONFIG_PACKAGE_kmod-fast-classifier=y
        CONFIG_PACKAGE_kmod-shortcut-fe=y

        CONFIG_PACKAGE_libcares=y
        CONFIG_PACKAGE_libev=y
        EOF

        # 删除 Ruby，避免奇怪依赖干掉 AX5 目标
        sed -i '/ruby/d' .config || true
        sed -i '/libruby/d' .config || true

        # 再次强制锁定 AX5，防止 defconfig 过程中 fallback
        cat >> .config <<EOF
        CONFIG_TARGET_ipq60xx=y
        CONFIG_TARGET_ipq60xx_generic=y
        CONFIG_TARGET_ipq60xx_generic_DEVICE_redmi_ax5=y
        EOF

        make defconfig

    - name: Verify Target (必须是 ipq60xx)
      run: |
        cd openwrt
        echo "当前 Target 配置："
        grep CONFIG_TARGET .config || true
        echo
        if ! grep -q 'CONFIG_TARGET_ipq60xx=y' .config; then
          echo "ERROR: Target 未锁定为 ipq60xx，已 fallback 到其他架构，终止构建。"
          exit 1
        fi

    - name: Download Packages
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: Add Swap (AX5 Required, GitHub Actions 兼容)
      run: |
        sudo swapoff -a || true
        sudo rm -f /swapfile || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Compile Firmware
      run: |
        cd openwrt
        echo "⚙️ 编译 kernel（单线程避免 OOM）"
        make target/linux/clean
        make
