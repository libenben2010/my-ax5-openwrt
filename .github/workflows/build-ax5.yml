name: Build ImmortalWrt Redmi AX5 (35MB + PassWall)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 初始化编译环境
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl

    - name: 克隆 ImmortalWrt 源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 强制替换 feeds.conf.default（关键步骤）
      run: |
        cd openwrt
        rm -f feeds.conf.default
        cat > feeds.conf.default <<EOF
src-git packages https://github.com/immortalwrt/packages
src-git luci https://github.com/immortalwrt/luci
src-git routing https://github.com/openwrt/routing
src-git telephony https://github.com/openwrt/telephony
src-git passwall https://github.com/xiaorouji/openwrt-passwall;main
src-git ddnsgo https://github.com/sirpdboy/luci-app-ddns-go;master
src-git turboacc https://github.com/chenmozhijin/turboacc;master
EOF

    - name: 更新 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 载入 AX5 配置
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/ax5.config .config
        make defconfig

    - name: 下载依赖包
      run: |
        cd openwrt
        make download -j8

    - name: 创建 Swap（防止 OOM）
      run: |
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: 开始编译固件
      run: |
        cd openwrt
        make -j1 V=s

    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: Redmi_AX5_35MB_Firmware
        path: openwrt/bin/targets/ipq60xx/generic/
