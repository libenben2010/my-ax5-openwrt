name: Build ImmortalWrt Redmi AX5 (35MB Optimized)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 初始化环境
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl

    - name: Clone ImmortalWrt
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update Feeds
      run: |
        cd openwrt
        echo "src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2" >> feeds.conf.default
        echo "src-git ddnsgo https://github.com/sirpdboy/luci-app-ddns-go" >> feeds.conf.default
        echo "src-git turboacc https://github.com/chenmozhijin/turboacc" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load AX5 Config
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/ax5.config .config
        make defconfig

    - name: Download Packages
      run: |
        cd openwrt
        make download -j8

    - name: Add Swap (防止 OOM)
      run: |
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Compile Firmware
      run: |
        cd openwrt
        make -j1 V=s

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: Redmi_AX5_35MB_Firmware
        path: openwrt/bin/targets/ipq60xx/generic/
